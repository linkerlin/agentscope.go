name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint-and-test:
    name: Lint, Format & Test (Linux)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: Go mod tidy
        run: go mod tidy

      - name: Ensure gofmt
        shell: bash
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "❌ The following Go files are not formatted with gofmt:"
            echo "$unformatted"
            echo "Please run 'gofmt -w .' locally and commit the changes."
            exit 1
          fi
          echo "✅ All Go files are properly formatted."

      - name: go vet
        run: go vet ./...

      - name: Build all packages
        run: go build ./...

      - name: Test (with race detector)
        run: go test -race -count=1 -timeout=12m ./...

      - name: Coverage (P3 enhancement)
        run: go test -race -count=1 -timeout=12m -coverprofile=coverage.out -covermode=atomic ./...
        # Upload or report coverage in real CI (e.g. codecov)

  test-windows:
    name: Build & Test (Windows)
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: Go mod tidy
        run: go mod tidy

      - name: Build all packages
        run: go build ./...

      - name: Test (Windows, race may be slower)
        run: go test -count=1 -timeout=15m ./...
        # Note: -race is enabled on Linux job; Windows is for cross-platform compatibility smoke test.
        # If needed, add -race back after stability validation.

  golangci:
    name: golangci-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          args: --timeout=5m ./...

  # Future enhancement (P2+):
  # - Benchmark reporting (non-blocking)
  # - Matrix with more Go versions
  # - Codecov / coverage reporting
