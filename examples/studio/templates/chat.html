<!doctype html>
<html lang="zh">
<head>
  <meta charset="utf-8">
  <title>Chat Demo - Studio</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: { 50: '#eef2ff', 100: '#e0e7ff', 500: '#6366f1', 600: '#4f46e5', 700: '#4338ca' },
            accent: { 50: '#f0fdfa', 100: '#ccfbf1', 500: '#14b8a6', 600: '#0d9488' }
          }
        }
      }
    }
  </script>
</head>
<body class="bg-gray-50 text-gray-800 min-h-screen">
  <nav class="bg-white border-b border-gray-200 sticky top-0 z-50">
    <div class="max-w-5xl mx-auto px-4 h-14 flex items-center gap-4">
      <a href="/" class="text-primary-600 font-medium hover:underline">← Dashboard</a>
      <h1 class="text-lg font-bold text-gray-900">Chat Demo</h1>
      <span class="text-xs bg-accent-100 text-accent-600 px-2 py-0.5 rounded-full">Auto Tools Enabled</span>
    </div>
  </nav>

  <main class="max-w-5xl mx-auto px-4 py-4 flex flex-col" style="height: calc(100vh - 3.5rem);">
    <div class="bg-green-50 border border-green-200 rounded-lg p-3 mb-3 text-sm text-green-800">
      <strong>Auto-Assembly Active：</strong>此 agent 拥有自动文件工具、任务管理、Web/JSON 工具等。尝试 "list workspace files" 或 "create a task about testing"。
    </div>

    <div class="flex gap-3 mb-3 text-sm">
      <label class="flex items-center gap-2">
        Agent ID: <input id="agent-id" value="demo-agent-1" class="border rounded px-2 py-1 w-40">
      </label>
      <label class="flex items-center gap-2">
        Session: <input id="session-id" value="demo-session-1" class="border rounded px-2 py-1 w-40">
      </label>
    </div>

    <div id="chat" class="flex-1 bg-white border border-gray-200 rounded-xl overflow-y-auto p-4 space-y-3 mb-3">
      <div class="text-center text-gray-400 text-sm py-8">Start a conversation...</div>
    </div>

    <form id="chat-form" class="flex gap-2">
      <input id="msg" type="text" placeholder="Ask the agent to list files, create a task, fetch web..." 
        class="flex-1 border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-primary-500" required>
      <button type="submit" class="bg-primary-600 hover:bg-primary-700 text-white px-6 py-2 rounded-lg font-medium transition">
        Send (SSE)
      </button>
    </form>
  </main>

  <script>
    const chat = document.getElementById('chat');
    const form = document.getElementById('chat-form');
    const msgInput = document.getElementById('msg');

    form.addEventListener('submit', async function(e) {
      e.preventDefault();
      const text = msgInput.value.trim();
      if (!text) return;

      // Clear placeholder if first message
      if (chat.querySelector('.text-center')) chat.innerHTML = '';

      // User bubble
      const userDiv = document.createElement('div');
      userDiv.className = 'flex justify-end';
      userDiv.innerHTML = `<div class="bg-primary-600 text-white rounded-2xl rounded-tr-sm px-4 py-2 max-w-[80%]">${escapeHtml(text)}</div>`;
      chat.appendChild(userDiv);
      chat.scrollTop = chat.scrollHeight;
      msgInput.value = '';

      // Assistant bubble
      const assistantDiv = document.createElement('div');
      assistantDiv.className = 'flex justify-start';
      assistantDiv.innerHTML = `
        <div class="bg-gray-100 rounded-2xl rounded-tl-sm px-4 py-2 max-w-[80%] min-w-[120px]">
          <div class="text-xs text-gray-500 mb-1">Assistant · streaming...</div>
          <div class="assistant-text text-gray-800"></div>
        </div>`;
      chat.appendChild(assistantDiv);
      const textEl = assistantDiv.querySelector('.assistant-text');
      const metaEl = assistantDiv.querySelector('.text-xs');

      try {
        const resp = await fetch('/v2/chat/stream', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            agent_id: document.getElementById('agent-id').value,
            session_id: document.getElementById('session-id').value,
            input: { text: text }
          })
        });
        if (!resp.ok) {
          textEl.innerHTML = `<span class="text-red-500">Error: ${resp.status}</span>`;
          return;
        }
        const reader = resp.body.getReader();
        const decoder = new TextDecoder();
        let buffer = '';
        let hasTool = false;

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          buffer += decoder.decode(value, { stream: true });
          const lines = buffer.split('\n');
          buffer = lines.pop() || '';
          for (const line of lines) {
            if (line.startsWith('data:')) {
              const dataStr = line.slice(5).trim();
              if (!dataStr) continue;
              try {
                const evt = JSON.parse(dataStr);
                if (evt.type === 'TEXT_MESSAGE_CONTENT' || evt.type === 'text_block_delta') {
                  textEl.innerHTML += escapeHtml(evt.delta || '');
                  chat.scrollTop = chat.scrollHeight;
                } else if (evt.type === 'TOOL_CALL_START' || evt.type === 'tool_call_start') {
                  hasTool = true;
                  const name = evt.toolCallName || evt.name || 'tool';
                  textEl.innerHTML += `<div class="my-1 px-2 py-1 bg-orange-50 border border-orange-200 rounded text-xs text-orange-700">🔧 ${escapeHtml(name)}</div>`;
                } else if (evt.type === 'TOOL_CALL_RESULT' || evt.type === 'tool_result') {
                  const content = evt.content || evt.output || JSON.stringify(evt);
                  textEl.innerHTML += `<div class="my-1 px-2 py-1 bg-purple-50 border border-purple-200 rounded text-xs text-purple-700">📦 ${escapeHtml(content.substring(0, 200))}</div>`;
                } else if (evt.type === 'RUN_FINISHED' || evt.type === 'reply_end') {
                  metaEl.textContent = 'Assistant';
                }
              } catch (e) {}
            }
          }
        }
      } catch (err) {
        textEl.innerHTML = `<span class="text-red-500">Stream error: ${escapeHtml(err.message)}</span>`;
      }
    });

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }
  </script>
</body>
</html>
