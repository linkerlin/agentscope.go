<!doctype html>
<html lang="zh">
<head>
  <meta charset="utf-8">
  <title>Credentials - AgentScope Go Studio</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
  <style>
    body { font-family: system-ui, sans-serif; margin: 2rem; }
    .schema-form { border: 1px solid #ccc; padding: 1rem; margin: 1rem 0; }
    label { display: block; margin: .25rem 0; font-weight: 600; }
    input, select { width: 100%; padding: .4rem; margin-bottom: .5rem; }
    .result { background: #f4f4f4; padding: .5rem; white-space: pre-wrap; font-family: monospace; }
    .nav { margin-bottom: 1rem; }
  </style>
</head>
<body>
  <div class="nav">
    <a href="/">← Back to Dashboard</a>
  </div>

  <h1>Credentials (Schemas-Driven)</h1>
  <p>此表单由后端 <code>GET {{.SchemasURL}}</code> 动态驱动（对应 Python 的 list_schemas + 前端动态表单）。</p>

  <div class="card">
    <h3>创建凭证 (Create Credential)</h3>
    <p>使用新的 schemas 驱动路径（data 字段）。后端现在同时支持旧的 flat (provider+value) 和新的 typed data。</p>

    <!-- Simple working form for the most common case (OpenAI) -->
    <form hx-post="{{.CreateURL}}" hx-target="#create-result" hx-swap="innerHTML">
      <input type="hidden" name="data[type]" value="openai">
      <label>显示名称 (Label)
        <input type="text" name="label" value="My OpenAI Key" required>
      </label>
      <label>API Key
        <input type="password" name="data[api_key]" placeholder="sk-..." required>
      </label>
      <label>Base URL (可选)
        <input type="text" name="data[base_url]" value="">
      </label>
      <button type="submit">创建凭证 (Create)</button>
    </form>

    <div id="create-result" class="result" style="margin-top:1rem"></div>

    <details style="margin-top:1rem">
      <summary>高级：直接提交 data JSON（使用任意 provider）</summary>
      <form hx-post="{{.CreateURL}}" hx-target="#create-result" hx-swap="innerHTML">
        <textarea name="data" rows="6" style="width:100%" placeholder='{"type":"openai","name":"foo","api_key":"sk-..."}'></textarea>
        <button type="submit">提交 data (JSON 形式)</button>
      </form>
    </details>

    <hr>

    <h4>当前凭证列表</h4>
    <button hx-get="{{.ListURL}}" hx-target="#cred-list" hx-swap="innerHTML">刷新列表 (Refresh List)</button>
    <div id="cred-list" class="result"></div>
  </div>

  <script>
    // After schemas load, we can enhance the form if needed.
    // For a real implementation we would parse the schema and generate inputs.
    // This minimal version shows the JSON schema and allows pasting a "data" object (power users)
    // or a simple form for the common OpenAI case.
  </script>
</body>
</html>
